<!DOCTYPE html>
<html>
<head>
    <title>Mappa Tabacchi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .popup-img { width: 100%; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 1. Inizializza la mappa su un punto (es. Roma)
        var map = L.map('map').setView([41.9028, 12.4964], 13);

        // 2. Aggiungi lo sfondo della mappa (OpenStreetMap - Gratis)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- 3. I TUOI DATI (QUI AGGIUNGI I TABACCHINI) ---
        var punti = [
            {
                nome: "Tabaccheria LexAne",
                lat: 45.06457362512852,  
                lon: 7.632232442048447,
                desc: "Vende tabacco trinciato cartine corte filtri slim e ultra slim snack e bevande, pos e satispay"
            },
            {
                nome: "Vinnolo Maurizio",
                lat: 45.06516725768255, 
                lon: 7.63642063282033,
                desc: "vende tabacco trinciato cartine corte filtri e kit con catine corte e filtri ultraslim e accendino, pos"
            }
        ];

        // 4. Metti i puntini sulla mappa automaticamente
        punti.forEach(function(punto) {
            var contenuto = "<b>" + punto.nome + "</b><br>" + 
                            punto.desc + "<br>" + 
                            "<img src='" + punto.foto + "' class='popup-img'>";
            
            L.marker([punto.lat, punto.lon]).addTo(map)
                .bindPopup(contenuto);
        });
    </script>
</body>
</html>
