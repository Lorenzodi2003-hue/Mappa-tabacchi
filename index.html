<!DOCTYPE html>
<html lang="it">
<head>
    <title>Mappa Tabacchi Intelligente</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .popup-img { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 150px; object-fit: cover; }
        .leaflet-popup-content { font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script>
        // --- CONFIGURAZIONE ---
        // INCOLLA QUI IL TUO LINK CSV DA GOOGLE SHEETS
        var public_spreadsheet_url = 'https://docs.google.com/spreadsheets/d/1-SD-vRclvEi7XdvsIdXKBMOgE-OdNZusd6voeINTlfA/edit?usp=drivesdk';

        // 1. Inizializzazione Mappa
        var map = L.map('map').setView([45.0610601, 7.6452931], 6); 

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Aggiunta della Barra di Ricerca (Gratis)
        L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: "Cerca una città o via..."
        })
        .on('markgeocode', function(e) {
            var bbox = e.geocode.bbox;
            map.fitBounds(bbox);
        })
        .addTo(map);

        // 3. Funzione per leggere i dati e metterli sulla mappa
        function caricaDati() {
            Papa.parse(public_spreadsheet_url, {
                download: true,
                header: true,
                complete: function(results) {
                    var punti = results.data;
                    
                    punti.forEach(function(punto) {
                        var contenuto = "<b>" + (punto.nome || 'Tabaccheria') + "</b><br>" + 
                                        (punto.desc || '') + "<br>";
                        if(punto.foto) {
                            contenuto += "<img src='" + punto.foto + "' class='popup-img'>";
                        }

                        // CASO A: Hai inserito le coordinate (più veloce)
                        if (punto.lat && punto.lon) {
                            aggiungiMarker(punto.lat, punto.lon, contenuto);
                        } 
                        // CASO B: Hai inserito solo l'indirizzo (Geocoding gratis)
                        else if (punto.indirizzo) {
                            cercaIndirizzo(punto.indirizzo, contenuto);
                        }
                    });
                }
            });
        }

        // Funzione per mettere il puntino sulla mappa
        function aggiungiMarker(lat, lon, contenuto) {
            L.marker([lat, lon]).addTo(map).bindPopup(contenuto);
        }

        // Funzione che trasforma l'indirizzo in coordinate (Nominatim)
        function cercaIndirizzo(indirizzo, contenuto) {
            var url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(indirizzo);
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        aggiungiMarker(data[0].lat, data[0].lon, contenuto);
                    } else {
                        console.log("Indirizzo non trovato: " + indirizzo);
                    }
                })
                .catch(err => console.log(err));
        }

        window.addEventListener('DOMContentLoaded', caricaDati);
    </script>
</body>
</html>
